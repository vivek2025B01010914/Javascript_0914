<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function & Methods</title>
</head>
<body>
    <script>
    //function for addition of two numbers
function twoSum(a,b){
    console.log("sum= "+a+b);
}
twoSum(100,50.66);

//function returning the number of vowels
function countVowel(str){
    let count=0
    for(let val of str){
        if(val=='a'||val=='i'||val=='e'||val=='u'||val=='o'){
            count++;
        }
    }
      return count;
}
let s=countVowel("helloo world alpha");
console.log("no. of vowels= "+s);

//square of array using forEach loop
let arr=[3,4,7,9,6]
arr.forEach(val => {
    console.log(val*val);
});

//filter method
let arr2=[2,4,5,6,22,45,32,31.2];
let divisileArr= arr2.filter((val)=>{
    if(val%3==0)
    return val;    
})
console.log(divisileArr);

//reduce method
//sum
let Ar=[2,-3,-5,14,1,5];
let result=Ar.reduce((sum,val) =>{
    return sum + val;
});
console.log(result);
//largest of array by reduce 
const largest=Ar.reduce((largest,val)=>{
    if(largest<val)
    return val;
    else
    return largest;     
});
console.log("largest= "+ largest);

//filter 90+ marks 
let marks =[60,70,90,57,67,89,90,91,94,98];
let topSt =marks.filter((val)=>{
    return val>90;
});
console.log(topSt); 

//use of reduce method for sum and factorial
let n=prompt("enter number:");
let A=[];
for(let i=1;i<=n;i++){
  A[i-1]=i;
}
console.log(A);
let Add=A.reduce((sum,val)=>{
 return sum + val;
});
console.log("sum upto "+ n +" is "+ Add);
let fact=A.reduce((multi,val)=>{
    return multi*val;
})
console.log("factorial of "+ n+" is "+ fact);







    </script>
</body>
</html>
