<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditional Statements</title>
</head>
<body>
    <script>
        //if-Condition
        //valid age for voting
        let age=25;
        if(age>=18){
            console.log(age + " is valid age for voting");
        }

        //if-else condition
        let myage=63;
        if(myage<18){
            console.log(myage+ " is not valid age for voting");
        }
        else{
            console.log(myage+ " is a valid age for voting");
        }

        //Switch
        let grade='C';
        switch(grade){
            case 'A':result="First Division";
            break;
            case 'B':result="Second Division";
            break;
            case 'C':result="Third Division";
            break;
            default:result="Fail";
        }
        console.log(result);

        //if-else-if condition
        let marks=22;
        if(marks>=60){
            console.log("First Grade");
        }
        else if(marks<60 && marks>=40){
            console.log("Second Grade");
        }
        else if (marks<40 && marks>=33){
            console.log("Third Grade");
        }
        else{
            console.log("Fail");
        }
    </script>
</body>
</html>
