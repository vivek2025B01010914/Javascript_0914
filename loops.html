<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops in js</title>
</head>
<body>
    <script>
        //types in loops
        let studentList=[ ["Saroj",23],
        "Vijay",
        "Vikas",
        "Mohan",
        "Zaid",
        22,
        21,
        23,
        35
        ];
        //for loop
        for(let i=0;i<studentList.length;i++){
           // console.log(studentList[0][0]);
            console.log(studentList[[i]]);
        }
        //while loop
        let i=0;
        while(i<=studentList.length){
            console.log(studentList[4]);
            i++;
        }
        //for-in loop 
        for(let val in studentList){
            console.log("for-in "+studentList[val]);
        }
        //for-of loop:-Iterates over the values of iterable objects such as arrays, strings, Maps, and Sets.
        for(let x of studentList){
            console.log("for-of "+x);
        }
    </script>
</body>
</html>
